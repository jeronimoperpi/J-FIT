<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="J-FIT">
<meta name="theme-color" content="#060911">
<title>J-FIT</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="%233b82f6"/><g stroke="white" stroke-width="2.3" stroke-linecap="round" fill="none"><path d="M9 9v14M6 12v8M23 9v14M26 12v8M9 16h14"/></g></svg>'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #060911; --card: #0e1526; --card-2: #131c33; --border: #1d2742;
    --txt: #f2f6ff; --txt-2: #8d99b8; --txt-3: #586087;
    --blue: #3b82f6; --blue-2: #5b9dff; --red: #f87171;
    --glow: rgba(59,130,246,.5);
  }
  html, body { background: var(--bg); color: var(--txt); }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(720px circle at 50% -6%, rgba(59,130,246,.16), transparent 55%); }

  .topbar { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between;
    max-width: 540px; margin: 0 auto; padding: calc(16px + env(safe-area-inset-top)) 16px 6px; }
  .brand { display: flex; align-items: center; gap: 11px; }
  .brand-ic { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, #2563eb, #4f9bff);
    display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--glow), inset 0 1px 0 rgba(255,255,255,.3); }
  .brand-ic svg { width: 22px; height: 22px; color: #fff; }
  .wordmark { font-family: "Orbitron", system-ui, sans-serif; font-weight: 800; font-size: 23px; letter-spacing: .02em; line-height: 1; }
  .wordmark .b { color: var(--blue-2); text-shadow: 0 0 16px rgba(91,157,255,.6); }
  .wordmark .w { color: #fff; }
  .top-btn { width: 38px; height: 38px; border-radius: 11px; background: var(--card); border: 1px solid var(--border);
    color: var(--txt-2); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .top-btn svg { width: 18px; height: 18px; }
  .top-btn:active { color: var(--txt); }

  .view { position: relative; z-index: 1; max-width: 540px; margin: 0 auto; padding: 10px 16px calc(112px + env(safe-area-inset-bottom)); }

  .tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 8px 16px; border-radius: 999px; font-size: 14px; white-space: nowrap; flex-shrink: 0;
    background: var(--card); border: 1px solid var(--border); color: var(--txt-2); cursor: pointer; transition: .15s; }
  .tab.active { background: var(--blue); color: #fff; font-weight: 600; border-color: var(--blue); box-shadow: 0 0 16px var(--glow); }
  .tab-add { color: var(--blue-2); font-weight: 700; border-style: dashed; }

  .day-head { margin: 16px 0 20px; }
  .day-top { display: flex; align-items: center; gap: 8px; }
  .day-name { flex: 1; min-width: 0; background: transparent; border: none; color: var(--txt);
    font-size: 26px; font-weight: 700; letter-spacing: -0.02em; padding: 2px 4px; border-radius: 8px; }
  .day-name:focus { outline: none; background: var(--card); }
  .day-del { background: none; border: none; color: var(--txt-3); cursor: pointer; flex-shrink: 0; padding: 6px; }
  .day-del svg { width: 18px; height: 18px; }
  .day-del:active { color: var(--red); }
  .day-sub { width: 100%; background: transparent; border: none; color: var(--txt-2); font-size: 14px; padding: 2px 4px; border-radius: 8px; margin-top: 2px; }
  .day-sub:focus { outline: none; background: var(--card); }

  .progress-row { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
  .bar { flex: 1; height: 8px; border-radius: 999px; background: var(--card-2); overflow: hidden; }
  .bar > div { height: 100%; background: linear-gradient(90deg, #2563eb, #4f9bff); box-shadow: 0 0 10px var(--glow); transition: width .25s; }
  .count { font-size: 14px; color: var(--txt-2); font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .clear { font-size: 12px; color: var(--txt-3); background: none; border: none; cursor: pointer; text-decoration: underline; text-underline-offset: 2px; flex-shrink: 0; }
  .clear:active { color: var(--txt); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
  .card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .ex-name { flex: 1; min-width: 0; background: transparent; border: none; color: var(--txt); font-size: 16px; font-weight: 600; padding: 2px 4px; border-radius: 8px; }
  .ex-name:focus { outline: none; background: var(--card-2); }
  .ex-count { font-size: 12px; color: var(--txt-3); font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .trash { background: none; border: none; color: var(--txt-3); cursor: pointer; flex-shrink: 0; padding: 2px; }
  .trash svg { width: 17px; height: 17px; }
  .trash:active { color: var(--red); }

  .set { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .idx { width: 24px; height: 24px; border-radius: 7px; background: var(--card-2); color: var(--txt-2); font-size: 12px; font-family: monospace;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .field { display: flex; align-items: center; gap: 4px; }
  .field input { background: var(--card-2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 8px; text-align: right;
    font-variant-numeric: tabular-nums; color: var(--txt); font-size: 14px; }
  .field input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  .kg { width: 62px; } .reps { width: 52px; }
  .unit { font-size: 12px; color: var(--txt-3); }
  .done { width: 36px; height: 36px; border-radius: 9px; border: 1px solid #2f3b5c; background: transparent; color: var(--txt-3);
    display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: .15s; }
  .done svg { width: 18px; height: 18px; }
  .done.on { background: var(--blue); border-color: var(--blue); color: #fff; box-shadow: 0 0 12px var(--glow); }
  .rm { margin-left: auto; background: none; border: none; color: var(--txt-3); cursor: pointer; font-size: 16px; flex-shrink: 0; padding: 4px; }
  .rm:active { color: var(--red); }

  .add-set { margin-top: 12px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 14px;
    color: var(--blue-2); background: transparent; cursor: pointer; border: 1px dashed #2f3b5c; border-radius: 9px; padding: 9px; }
  .add-set:active { border-color: var(--blue); }
  .add-ex { margin-top: 16px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px;
    font-weight: 600; color: var(--txt); background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; cursor: pointer; }
  .add-ex:active { border-color: #2f3b5c; }
  .foot { text-align: center; font-size: 12px; color: var(--txt-3); margin-top: 24px; }

  /* Hábitos */
  .hb-head { margin: 6px 0 20px; }
  .hb-title { font-size: 25px; font-weight: 700; letter-spacing: -0.01em; color: #fff; }
  .title-accent { width: 44px; height: 3px; border-radius: 2px; background: linear-gradient(90deg, #2563eb, #4f9bff); box-shadow: 0 0 10px var(--glow); margin: 9px 0 2px; }
  .hb-list { display: flex; flex-direction: column; gap: 10px; }
  .hb-item { display: flex; align-items: center; gap: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; cursor: pointer; transition: .15s; }
  .hb-item:active { background: var(--card-2); }
  .hb-check { width: 26px; height: 26px; border-radius: 8px; border: 1.5px solid #2f3b5c; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #fff; transition: .15s; }
  .hb-check.on { background: var(--blue); border-color: var(--blue); box-shadow: 0 0 12px var(--glow); }
  .hb-check svg { width: 16px; height: 16px; }
  .hb-name { flex: 1; font-size: 15px; font-weight: 500; }
  .hb-name.done { color: var(--txt-2); text-decoration: line-through; text-decoration-color: var(--txt-3); }
  .hb-rm { background: none; border: none; color: var(--txt-3); font-size: 15px; cursor: pointer; flex-shrink: 0; padding: 4px; }
  .hb-rm:active { color: var(--red); }
  .hb-add { display: flex; gap: 8px; margin-top: 16px; }
  .hb-add input { flex: 1; background: var(--card-2); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; color: var(--txt); font-size: 15px; }
  .hb-add input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  .hb-add-btn { width: 48px; border: none; border-radius: 12px; background: var(--blue); color: #fff; font-size: 24px; cursor: pointer; box-shadow: 0 0 16px var(--glow); }
  .hb-add-btn:active { filter: brightness(1.12); }
  .empty { color: var(--txt-3); text-align: center; padding: 28px 16px; font-size: 14px; line-height: 1.6; }

  /* Cardio */
  .cardio-modes { display: flex; gap: 8px; margin: 8px 0 8px; }
  .cmode { flex: 1; padding: 11px; border-radius: 12px; background: var(--card); border: 1px solid var(--border); color: var(--txt-2); font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; }
  .cmode.active { background: var(--blue); color: #fff; border-color: var(--blue); box-shadow: 0 0 14px var(--glow); }
  .time-display { font-family: "Orbitron", monospace; font-size: 62px; font-weight: 800; text-align: center; letter-spacing: .02em; margin: 26px 0; color: #fff; text-shadow: 0 0 26px rgba(91,157,255,.4); font-variant-numeric: tabular-nums; }
  .time-display.finished { color: var(--blue-2); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }
  .ctrl-row { display: flex; gap: 10px; justify-content: center; margin-top: 6px; }
  .ctrl { flex: 1; max-width: 160px; padding: 15px; border-radius: 14px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
  .ctrl.primary { background: var(--blue); color: #fff; box-shadow: 0 0 18px var(--glow); }
  .ctrl.ghost { background: var(--card); color: var(--txt); border: 1px solid var(--border); }
  .ctrl:active { filter: brightness(1.1); }
  .presets { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 18px; }
  .preset { padding: 9px 14px; border-radius: 999px; background: var(--card); border: 1px solid var(--border); color: var(--txt-2); font-size: 13px; cursor: pointer; font-variant-numeric: tabular-nums; }
  .preset.on { border-color: var(--blue); color: var(--blue-2); }
  .custom-time { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px; }
  .ct-input { width: 74px; background: var(--card-2); border: 1px solid var(--border); border-radius: 12px; padding: 13px; text-align: center; color: var(--txt); font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .ct-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  .ct-colon { font-size: 24px; font-weight: 700; color: var(--txt-2); }
  .ct-hint { text-align: center; font-size: 12px; color: var(--txt-3); margin-bottom: 22px; }
  .laps { margin-top: 26px; display: flex; flex-direction: column; gap: 6px; }
  .lap { display: flex; justify-content: space-between; padding: 11px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; font-variant-numeric: tabular-nums; font-size: 14px; }
  .lap span:first-child { color: var(--txt-2); }

  /* Comida / Calorías */
  .ring-wrap { position: relative; width: 180px; height: 180px; margin: 8px auto 6px; }
  .ring { width: 180px; height: 180px; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: var(--card-2); stroke-width: 10; }
  .ring-fill { fill: none; stroke: var(--blue); stroke-width: 10; stroke-linecap: round; filter: drop-shadow(0 0 6px var(--glow)); transition: stroke-dashoffset .4s; }
  .ring-fill.over { stroke: var(--red); filter: none; }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-num { font-family: "Orbitron", monospace; font-size: 33px; font-weight: 800; color: #fff; font-variant-numeric: tabular-nums; }
  .ring-num.over { color: var(--red); }
  .ring-lbl { font-size: 12px; color: var(--txt-2); margin-top: 3px; }
  .ring-sub { text-align: center; color: var(--txt-2); font-size: 14px; margin-bottom: 18px; font-variant-numeric: tabular-nums; }
  .macros { display: flex; flex-direction: column; gap: 13px; margin-bottom: 12px; }
  .macro-top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .macro-top b { color: var(--txt); font-weight: 600; }
  .macro-top span { color: var(--txt-2); font-variant-numeric: tabular-nums; }
  .cal-edit { display: block; margin: 0 auto 22px; background: none; border: none; color: var(--blue-2); font-size: 13px; cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
  .cal-search input { width: 100%; background: var(--card-2); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; color: var(--txt); font-size: 15px; }
  .cal-search input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  #foodResults { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .food-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; cursor: pointer; }
  .food-row:active { background: var(--card-2); }
  .food-name { font-size: 14px; }
  .food-kcal { font-size: 13px; color: var(--blue-2); font-variant-numeric: tabular-nums; display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
  .food-kcal span { font-size: 10px; color: var(--txt-3); }
  .cal-hint { color: var(--txt-3); font-size: 13px; text-align: center; padding: 14px; }
  .cal-create { margin: 10px 0 20px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 14px;
    color: var(--blue-2); background: transparent; cursor: pointer; border: 1px dashed #2f3b5c; border-radius: 10px; padding: 11px; }
  .cal-create:active { border-color: var(--blue); }
  .diary-head { display: flex; align-items: center; justify-content: space-between; margin: 4px 0 12px; }
  .diary-head .t { font-size: 17px; font-weight: 700; }
  .diary-head .s { font-size: 13px; color: var(--txt-2); font-variant-numeric: tabular-nums; }
  .diary-item { display: flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: .15s; }
  .diary-item:active { background: var(--card-2); }
  .diary-name { flex: 1; min-width: 0; font-size: 14px; }
  .diary-name span { display: block; font-size: 12px; color: var(--txt-3); margin-top: 2px; }
  .diary-kcal { font-size: 14px; color: var(--txt); font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .diary-rm { background: none; border: none; color: var(--txt-3); font-size: 15px; cursor: pointer; flex-shrink: 0; padding: 4px; }
  .diary-rm:active { color: var(--red); }
  .cal-empty { text-align: center; padding: 40px 20px; }
  .cal-empty-ic { width: 60px; height: 60px; border-radius: 16px; background: var(--card-2); display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; color: var(--blue-2); }
  .cal-empty-ic svg { width: 30px; height: 30px; }
  .cal-empty-title { font-size: 21px; font-weight: 700; margin-bottom: 8px; }
  .cal-empty-sub { color: var(--txt-2); font-size: 14px; line-height: 1.6; margin-bottom: 22px; }

  .sheet-bg { position: fixed; inset: 0; z-index: 59; background: rgba(0,0,0,.55); }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 60; max-width: 540px; margin: 0 auto;
    background: var(--card); border: 1px solid var(--border); border-bottom: none; border-radius: 20px 20px 0 0;
    padding: 22px 18px calc(20px + env(safe-area-inset-bottom)); box-shadow: 0 -12px 40px rgba(0,0,0,.6); }
  .sheet-title { font-size: 19px; font-weight: 700; margin-bottom: 16px; }
  .sheet-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .sheet-input { width: 110px; background: var(--card-2); border: 1px solid var(--border); border-radius: 12px; padding: 13px; text-align: center; color: var(--txt); font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .sheet-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  .sheet-unit { font-size: 15px; color: var(--txt-2); }
  .sheet-preview { color: var(--blue-2); font-size: 14px; font-variant-numeric: tabular-nums; margin-bottom: 18px; }
  .sheet-btns { display: flex; gap: 10px; }
  .sheet-btns .ctrl { max-width: none; }

  .form-head { display: flex; align-items: center; gap: 10px; margin: 6px 0 4px; }
  .form-back { background: none; border: none; color: var(--txt); font-size: 28px; cursor: pointer; line-height: 1; padding: 0 4px; }
  .form-title { font-size: 22px; font-weight: 700; }
  .form-sub { color: var(--txt-2); font-size: 13px; margin-bottom: 20px; }
  .form-group { margin-bottom: 18px; }
  .form-label { font-size: 13px; color: var(--txt-2); margin-bottom: 9px; display: block; }
  .seg { display: flex; flex-wrap: wrap; gap: 8px; }
  .seg button { padding: 11px 15px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); color: var(--txt-2); font-size: 13px; font-weight: 600; cursor: pointer; }
  .seg button.on { background: var(--blue); color: #fff; border-color: var(--blue); box-shadow: 0 0 12px var(--glow); }
  .form-input { width: 100%; background: var(--card-2); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; color: var(--txt); font-size: 16px; }
  .form-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  .form-row2 { display: flex; gap: 10px; }
  .form-row2 .form-group { flex: 1; }
  .form-save { margin-top: 6px; width: 100%; padding: 15px; border-radius: 14px; border: none; background: var(--blue); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 0 18px var(--glow); }
  .form-save:active { filter: brightness(1.1); }
  .form-or { text-align: center; color: var(--txt-3); font-size: 12px; margin: 22px 0 12px; }

  .step-quick { display: flex; gap: 8px; margin-bottom: 12px; }
  .qbtn { flex: 1; padding: 13px; border-radius: 12px; background: var(--card); border: 1px solid var(--border); color: var(--txt); font-size: 14px; font-weight: 600; cursor: pointer; }
  .qbtn:active { border-color: var(--blue); }
  .step-set { display: flex; gap: 8px; margin-bottom: 14px; }
  .step-set .form-input { flex: 1; }

  .icon-mini { background: none; border: none; color: var(--txt-3); cursor: pointer; flex-shrink: 0; padding: 2px; }
  .icon-mini svg { width: 17px; height: 17px; }
  .icon-mini:active { color: var(--blue-2); }
  .ex-sheet { max-height: 82vh; display: flex; flex-direction: column; }
  .ex-search { width: 100%; background: var(--card-2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; color: var(--txt); font-size: 15px; margin-bottom: 12px; flex-shrink: 0; }
  .ex-search:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  .ex-chips { display: flex; flex-wrap: wrap; gap: 8px; padding-bottom: 12px; flex-shrink: 0; align-items: center; }
  .ex-chips::-webkit-scrollbar { display: none; }
  .ex-chip { display: inline-flex; align-items: center; justify-content: center; padding: 8px 14px; border-radius: 999px; background: var(--card-2); border: 1px solid var(--border); color: var(--txt-2); font-size: 13px; line-height: 1.2; white-space: nowrap; flex-shrink: 0; cursor: pointer; }
  .ex-chip.on { background: var(--blue); color: #fff; border-color: var(--blue); }
  .ex-list { overflow-y: auto; display: flex; flex-direction: column; gap: 6px; flex: 1; min-height: 100px; }
  .ex-pick { text-align: left; background: var(--card-2); border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; color: var(--txt); font-size: 14px; cursor: pointer; }
  .ex-pick:active { border-color: var(--blue); }
  .ex-custom { text-align: left; background: transparent; border: 1px dashed #2f3b5c; border-radius: 10px; padding: 12px 14px; color: var(--blue-2); font-size: 14px; cursor: pointer; margin-top: 8px; flex-shrink: 0; }
  .w-current { text-align: center; margin: 6px 0 14px; }

function initAudio(){ try{ audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==="suspended") audioCtx.resume(); }catch(e){} }
function beep(){
  try{ initAudio(); if(!audioCtx) throw 0; const now=audioCtx.currentTime;
    for(let i=0;i<3;i++){ const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
      o.type="sine"; o.frequency.value=880; const t=now+i*0.28;
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.35,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.18);
      o.start(t); o.stop(t+0.2); } }catch(e){}
  try{ if(navigator.vibrate) navigator.vibrate([200,100,200,100,200]); }catch(e){}
}
function fmt(ms, ceil){ let s = ceil?Math.ceil(ms/1000):Math.floor(ms/1000); if(s<0)s=0;
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  const mm=String(m).padStart(2,"0"), ss=String(sec).padStart(2,"0"); return h>0 ? h+":"+mm+":"+ss : mm+":"+ss; }

const RC = 2*Math.PI*52;
let liveCounting=false, lpf=9.8, prevDyn=0, lastStepTs=0, stepsSaveTs=0;

function save(){ try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {} }
const day = () => state.days.find(d => d.id === activeId) || state.days[0];
function checkDaily(){ const t=today(); let ch=false;
  if (state.habitsDate !== t) { state.habits.forEach(h=>h.done=false); state.habitsDate=t; ch=true; }
  if (state.diaryDate !== t) { state.diary=[]; state.diaryDate=t; ch=true; }
  if (state.stepsDate !== t) { state.steps=0; state.stepsDate=t; ch=true; }
  if (state.waterDate !== t) { state.water=0; state.waterDate=t; ch=true; }
  if (ch) save();
}
function calcTarget(p){
  let bmr = 10*(+p.weight) + 6.25*(+p.height) - 5*(+p.age) + (p.sex==="m"?5:-161);
  const act = {sed:1.2,lig:1.375,mod:1.55,act:1.725,muy:1.9}[p.activity] || 1.55;
  const g = {bajar:0.8,mantener:1.0,ganar:1.1}[p.goal] || 1.0;
  return Math.round(bmr*act*g);
}
function macroTargets(){
  const t = state.calTarget||0;
  const w = state.calProfile && state.calProfile.weight ? +state.calProfile.weight : 0;
  let p = w>0 ? Math.round(w*2) : Math.round(t*0.30/4);
  const f = Math.round(t*0.25/9);
  const c = Math.max(0, Math.round((t - p*4 - f*9)/4));
  return {p,c,f};
}
function diaryTotals(){ return state.diary.reduce((a,e)=>({kcal:a.kcal+e.kcal,p:a.p+e.p,c:a.c+e.c,f:a.f+e.f}),{kcal:0,p:0,c:0,f:0}); }
function onMotion(e){
  const a = e.accelerationIncludingGravity; if(!a) return;
  const mag = Math.sqrt((a.x||0)*(a.x||0)+(a.y||0)*(a.y||0)+(a.z||0)*(a.z||0));
  lpf = lpf*0.9 + mag*0.1;
  const dyn = mag - lpf, now = Date.now();
  if (dyn>1.2 && prevDyn<=1.2 && (now-lastStepTs)>300){
    state.steps = (state.steps||0)+1; lastStepTs=now;
    const el=document.getElementById("stepNum"); if(el) el.textContent=(state.steps).toLocaleString("es-AR");
    const ring=document.getElementById("stepRing"); if(ring){ const g=state.stepsGoal||10000; ring.style.strokeDashoffset = RC*(1-Math.min(state.steps/g,1)); }
    if(now-stepsSaveTs>3000){ save(); stepsSaveTs=now; }
  }
  prevDyn = dyn;
}
async function startLive(){
  try{
    if (typeof DeviceMotionEvent!=="undefined" && typeof DeviceMotionEvent.requestPermission==="function"){
      const res = await DeviceMotionEvent.requestPermission();
      if (res!=="granted"){ alert("Necesito permiso de movimiento para contar pasos."); return; }
    }
    window.addEventListener("devicemotion", onMotion);
    liveCounting=true; renderApp();
  }catch(err){ alert("Tu dispositivo no permite usar el sensor de movimiento en el navegador."); }
}
function stopLive(){ try{ window.removeEventListener("devicemotion", onMotion); }catch(e){} liveCounting=false; save(); renderApp(); }

function renderCardio(){
  const modes = `<div class="cardio-modes">
    <button class="cmode${cardioMode==='stopwatch'?' active':''}" data-action="cardio-mode" data-mode="stopwatch">Cronómetro</button>
    <button class="cmode${cardioMode==='timer'?' active':''}" data-action="cardio-mode" data-mode="timer">Temporizador</button>
  </div>`;
  if (cardioMode === "stopwatch") {
    const elapsed = swRunning ? swAccum + (Date.now()-swStartTs) : swAccum;
    const laps = swLaps.length ? `<div class="laps">${swLaps.map((t,i)=>({t,i})).reverse().map(o=>`<div class="lap"><span>Vuelta ${o.i+1}</span><span>${fmt(o.t)}</span></div>`).join("")}</div>` : "";
    return modes + `
      <div class="time-display" id="swTime">${fmt(elapsed)}</div>
      <div class="ctrl-row">
        <button class="ctrl ${swRunning?'ghost':'primary'}" data-action="sw-toggle">${swRunning?'Pausar':'Iniciar'}</button>
        ${swRunning?'<button class="ctrl ghost" data-action="sw-lap">Vuelta</button>':''}
        <button class="ctrl ghost" data-action="sw-reset">Reiniciar</button>
      </div>${laps}`;
  } else {
    const rem = tmRunning ? Math.max(0, tmEndTs-Date.now()) : tmRemainingMs;
    const presetVals = [30,60,90,120,180,300];
    const editable = !tmRunning && !tmFinished;
    const cm = Math.floor(tmTarget/60000), cs = Math.floor((tmTarget%60000)/1000);
    const editor = editable ? `
      <div class="presets">${presetVals.map(v=>`<button class="preset${tmTarget===v*1000?' on':''}" data-action="tm-preset" data-sec="${v}">${fmt(v*1000)}</button>`).join("")}</div>
      <div class="custom-time">
        <input id="tmMin" class="ct-input" type="text" inputmode="numeric" maxlength="3" value="${cm}" data-action="tm-min">
        <span class="ct-colon">:</span>
        <input id="tmSec" class="ct-input" type="text" inputmode="numeric" maxlength="2" value="${String(cs).padStart(2,'0')}" data-action="tm-sec">
      </div>
      <div class="ct-hint">minutos : segundos — personalizá lo que quieras</div>` : "";
    let ctrls;
    if (tmRunning) ctrls = '<button class="ctrl ghost" data-action="tm-toggle">Pausar</button><button class="ctrl ghost" data-action="tm-reset">Reiniciar</button>';
    else if (tmFinished) ctrls = '<button class="ctrl primary" data-action="tm-reset">Reiniciar</button>';
    else ctrls = '<button class="ctrl primary" data-action="tm-toggle">Iniciar</button>';
    return modes + `
      <div class="time-display${tmFinished?' finished':''}" id="tmTime">${tmFinished?'00:00':fmt(rem,true)}</div>
      ${editor}
      <div class="ctrl-row">${ctrls}</div>`;
  }
}

function fmtDate(d){ const p=(d||"").split("-"); if(p.length!==3) return d; const m=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"]; return parseInt(p[2],10)+" "+(m[parseInt(p[1],10)-1]||""); }
function fmtDInput(d){ const p=(d||"").split("-"); if(p.length!==3) return d; return p[2]+"/"+p[1]+"/"+p[0]; }
function renderWChart(ws){
  const W=340,H=180,pl=40,pr=14,pt=16,pb=24, plotW=W-pl-pr, plotH=H-pt-pb;
  const times=ws.map(e=>new Date(e.date+"T00:00:00").getTime());
  const kgs=ws.map(e=>e.kg);
  let minK=Math.min.apply(null,kgs), maxK=Math.max.apply(null,kgs);
  let range=maxK-minK; if(range<1) range=1; const padK=range*0.18;
  const loK=minK-padK, hiK=maxK+padK;
  const minT=Math.min.apply(null,times), maxT=Math.max.apply(null,times), tRange=maxT-minT;
  const X=t=> ws.length<2 ? pl+plotW/2 : pl+(tRange?(t-minT)/tRange:0)*plotW;
  const Y=k=> pt+(1-(k-loK)/(hiK-loK))*plotH;
  const pts=ws.map((e,i)=>({x:X(times[i]),y:Y(e.kg)}));
  const line=pts.map((p,i)=>(i?"L":"M")+p.x.toFixed(1)+" "+p.y.toFixed(1)).join(" ");
  const baseY=(pt+plotH).toFixed(1);
  const area=pts.length>1 ? "M"+pts[0].x.toFixed(1)+" "+baseY+" "+pts.map(p=>"L"+p.x.toFixed(1)+" "+p.y.toFixed(1)).join(" ")+" L"+pts[pts.length-1].x.toFixed(1)+" "+baseY+" Z" : "";
  const yVals=[hiK,(loK+hiK)/2,loK];
  const grid=yVals.map(v=>{const y=Y(v).toFixed(1);return '<line x1="'+pl+'" y1="'+y+'" x2="'+(W-pr)+'" y2="'+y+'" stroke="#1d2742" stroke-width="1"/><text x="'+(pl-6)+'" y="'+(parseFloat(y)+3).toFixed(1)+'" fill="#586087" font-size="9" text-anchor="end">'+v.toFixed(1)+'</text>';}).join("");
  const dots=pts.map((p,i)=>'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+(i===pts.length-1?4:3)+'" fill="'+(i===pts.length-1?'#5b9dff':'#3b82f6')+'"/>').join("");
  const xl='<text x="'+pl+'" y="'+(H-6)+'" fill="#586087" font-size="9" text-anchor="start">'+fmtDate(ws[0].date)+'</text>'+(ws.length>1?'<text x="'+(W-pr)+'" y="'+(H-6)+'" fill="#586087" font-size="9" text-anchor="end">'+fmtDate(ws[ws.length-1].date)+'</text>':'');
  return '<div class="w-chart"><svg viewBox="0 0 '+W+' '+H+'" width="100%"><defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3b82f6"/><stop offset="1" stop-color="#3b82f6" stop-opacity="0"/></linearGradient></defs>'+grid+(area?'<path d="'+area+'" fill="url(#wg)" opacity="0.3"/>':'')+(pts.length>1?'<path d="'+line+'" fill="none" stroke="#4f9bff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>':'')+dots+xl+'</svg></div>';
}
function muscleOf(name){ const n=(name||"").trim().toLowerCase(); for(const cat in EX_DB){ if(EX_DB[cat].some(x=>x.toLowerCase()===n)) return cat; } return "otros"; }
function renderVolumen(){
  const labels={pecho:"Pecho",espalda:"Espalda",hombros:"Hombros",biceps:"Bíceps",triceps:"Tríceps",piernas:"Piernas",gemelos:"Gemelos",abs:"Abdominales",antebrazo:"Antebrazo",cuello:"Cuello",otros:"Otros"};
  const tally={};
  (state.days||[]).forEach(d=>{ (d.exercises||[]).forEach(ex=>{ const m=muscleOf(ex.name); const sets=(ex.sets||[]).length; tally[m]=(tally[m]||0)+sets; }); });
  const rows=Object.keys(tally).filter(k=>tally[k]>0).map(k=>({label:labels[k]||k,sets:tally[k]})).sort((a,b)=>b.sets-a.sets);
  if(!rows.length) return "";
  const total=rows.reduce((x,r)=>x+r.sets,0), max=rows[0].sets;
  const bars=rows.map(r=>`<div class="vol-row"><div class="vol-lbl">${r.label}</div><div class="vol-bar"><div class="vol-fill" style="width:${Math.round(r.sets/max*100)}%"></div></div><div class="vol-n">${r.sets}</div></div>`).join("");
  return `
    <div class="hb-head" style="margin-top:28px"><div class="hb-title">Volumen semanal</div><div class="title-accent"></div></div>

    <p class="foot">Series totales por grupo sumando todos tus días de rutina. Una guía general de hipertrofia es ~10–20 series por grupo a la semana.</p>`;
}
function renderProgreso(){

let scanner=null, h5Loading=null, lastScanName="";
function loadH5(){
  if(window.__Html5QrcodeLibrary__||window.Html5Qrcode) return Promise.resolve();
  if(h5Loading) return h5Loading;
  h5Loading=new Promise((res,rej)=>{ const sc=document.createElement("script"); sc.src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"; sc.onload=()=>res(); sc.onerror=()=>{ h5Loading=null; rej(new Error("load")); }; document.head.appendChild(sc); });
  return h5Loading;
}
function scanStatus(t){ const s=document.getElementById("scanStatus"); if(s) s.textContent=t; }
function scanActions(html){ const a=document.getElementById("scanActions"); if(a) a.innerHTML=html||""; }
function scanOverlayHTML(){ return `<div class="scan-overlay"><div class="scan-head"><span class="scan-title">Escanear código</span><button class="scan-x" data-action="scan-close">✕</button></div><div id="qrReader" class="scan-reader"></div><div class="scan-status" id="scanStatus">Iniciando cámara…</div><div class="scan-tip">Tip: estirá el código si está arrugado, con buena luz y sin acercar de más.</div><div class="scan-actions" id="scanActions"></div></div>`; }
async function openScanner(){
  const host=document.getElementById("scanHost"); if(!host) return;
  host.innerHTML=scanOverlayHTML();
  scanStatus("Cargando lector…");
  try{ await loadH5(); }catch(e){ scanStatus("No se pudo cargar el lector. Revisá tu conexión a internet."); scanActions('<button class="ctrl ghost" data-action="scan-close">Cerrar</button>'); return; }
  const LIB=window.__Html5QrcodeLibrary__||{}; const H5=window.Html5Qrcode||LIB.Html5Qrcode; const FMT=window.Html5QrcodeSupportedFormats||LIB.Html5QrcodeSupportedFormats;
  if(!H5){ scanStatus("No se pudo iniciar el lector."); return; }
  let handled=false;
  scanner=new H5("qrReader", FMT?{formatsToSupport:[FMT.EAN_13,FMT.EAN_8,FMT.UPC_A,FMT.UPC_E,FMT.CODE_128],experimentalFeatures:{useBarCodeDetectorIfSupported:true},verbose:false}:{experimentalFeatures:{useBarCodeDetectorIfSupported:true},verbose:false});
  scanStatus("Apuntá la cámara al código de barras…");
  try{
    await scanner.start({facingMode:"environment",width:{ideal:1920},height:{ideal:1080}}, {fps:10, qrbox:(w)=>{ const ww=Math.max(220,Math.round((w||300)*0.92)); return {width:ww,height:Math.round(ww*0.55)}; }}, (text)=>{ if(handled)return; handled=true; onBarcode(String(text)); }, ()=>{});
  }catch(err){ scanStatus("No pudimos abrir la cámara. Dale permiso de cámara a Safari y volvé a intentar."); scanActions('<button class="ctrl primary" data-action="scan-retry">Reintentar</button><button class="ctrl ghost" data-action="scan-close">Cerrar</button>'); }
}
function stopScanner(){ return new Promise((res)=>{ if(!scanner){ res(); return; } const sc=scanner; scanner=null; try{ sc.stop().then(()=>{ try{sc.clear();}catch(e){} res(); }).catch(()=>{ res(); }); }catch(e){ res(); } }); }
function closeScanner(){ stopScanner().then(()=>{ const host=document.getElementById("scanHost"); if(host) host.innerHTML=""; }); }
async function onBarcode(code){
  await stopScanner();
  scanStatus("Buscando producto… ("+code+")");
  const round1=x=>x==null?0:Math.round(parseFloat(x)*10)/10;
  let prod=null;
  try{
    const r=await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}.json?fields=product_name,product_name_es,brands,nutriments`);
    const j=await r.json();
    if(j&&j.status===1&&j.product) prod=j.product;
  }catch(e){ scanStatus("Error de conexión. Revisá internet y probá de nuevo."); scanActions('<button class="ctrl primary" data-action="scan-retry">Reintentar</button><button class="ctrl ghost" data-action="scan-close">Cerrar</button>'); return; }
  if(!prod){ lastScanName=""; scanStatus("No encontramos ese código en Open Food Facts."); scanActions('<button class="ctrl primary" data-action="scan-retry">Escanear otro</button><button class="ctrl ghost" data-action="scan-manual">Cargarlo a mano</button>'); return; }
  const n=prod.nutriments||{};
  const name=prod.product_name_es||prod.product_name||(prod.brands?String(prod.brands).split(",")[0]:("Producto "+code));
  const kcalRaw=n["energy-kcal_100g"];
  if(kcalRaw==null){ lastScanName=name; scanStatus('"'+name+'" no tiene calorías cargadas en la base.'); scanActions('<button class="ctrl primary" data-action="scan-manual">Cargar datos a mano</button><button class="ctrl ghost" data-action="scan-retry">Escanear otro</button>'); return; }
  const food={ name:name, kcal:Math.round(parseFloat(kcalRaw)), p:round1(n["proteins_100g"]), c:round1(n["carbohydrates_100g"]), f:round1(n["fat_100g"]), portion:100 };
  closeScanner();
  selectedFood=food; renderApp();
}

// ---- Tick ----
function tick(){
  const now = Date.now();
  if (tmRunning){
    const rem = tmEndTs - now;
    if (rem <= 0){ tmRunning=false; tmRemainingMs=0; tmFinished=true; beep(); if(view==="cardio") renderApp(); }
    else { tmRemainingMs = rem; if(view==="cardio" && cardioMode==="timer"){ const el=document.getElementById("tmTime"); if(el) el.textContent=fmt(rem,true); } }
  }
  if (swRunning && view==="cardio" && cardioMode==="stopwatch"){ const el=document.getElementById("swTime"); if(el) el.textContent=fmt(swAccum+(now-swStartTs)); }
}

  if (a === "scan-manual") { closeScanner(); creatingFood=true; selectedFood=null; editEntry=null; foodForm.name=lastScanName||""; foodForm.kcal=""; foodForm.p=""; foodForm.c=""; foodForm.f=""; renderApp(); return; }
  if (a === "portion-cancel") { selectedFood=null; editEntry=null; renderApp(); return; }
  if (a === "portion-add") {
    const g = parseFloat((document.getElementById("portionGrams")||{}).value); if(!(g>0)){ return; }
    const f = selectedFood; if(!f){ return; } const fc = g/100;
    state.diary.push({ id:uid(), name:f.name, grams:Math.round(g), kcal:Math.round(f.kcal*fc), p:+(f.p*fc).toFixed(1), c:+(f.c*fc).toFixed(1), f:+(f.f*fc).toFixed(1), base:{kcal:f.kcal,p:f.p,c:f.c,f:f.f} });
    selectedFood=null; save(); renderApp(); return;
  }
  if (a === "portion-save") {
    const g = parseFloat((document.getElementById("portionGrams")||{}).value); if(!(g>0)){ return; }
    const e = editEntry; if(!e){ return; } const base=entryBase(e); const fc=g/100;
    e.grams=Math.round(g); e.kcal=Math.round(base.kcal*fc); e.p=+(base.p*fc).toFixed(1); e.c=+(base.c*fc).toFixed(1); e.f=+(base.f*fc).toFixed(1); e.base=base;
    editEntry=null; save(); renderApp(); return;
  }
  if (a === "diary-edit") { editEntry = state.diary.find(x=>x.id===el.dataset.id)||null; selectedFood=null; renderApp(); return; }
  if (a === "diary-remove") { state.diary = state.diary.filter(x=>x.id!==el.dataset.id); save(); renderApp(); return; }

  // Pasos
  if (a === "steps-add") { state.steps = Math.max(0,(state.steps||0)+parseInt(el.dataset.n)); save(); renderApp(); return; }
  if (a === "steps-set") { const n=parseInt((document.getElementById("stepInput")||{}).value); if(n>=0){ state.steps=n; save(); renderApp(); } else alert("Pon\u00e9 un n\u00famero v\u00e1lido."); return; }
  if (a === "steps-goal") { const g=prompt("Meta diaria de pasos:", state.stepsGoal||10000); if(g!==null){ const n=parseInt(g); if(n>0){ state.stepsGoal=n; save(); renderApp(); } } return; }
  if (a === "steps-live") { if(liveCounting) stopLive(); else startLive(); return; }

  // Ejercicios (picker)
  if (a === "ex-add-open") { exPicker={mode:"add"}; exCat="pecho"; exQuery=""; renderApp(); return; }
  if (a === "ex-swap") { exPicker={mode:"swap", exId:el.dataset.ex}; exCat="pecho"; exQuery=""; renderApp(); return; }
  if (a === "ex-cat") { exCat=el.dataset.cat; exQuery=""; renderApp(); return; }
  if (a === "ex-cancel") { exPicker=null; renderApp(); return; }
  if (a === "ex-choose") { const name=el.dataset.name; const d=day(); if(exPicker && exPicker.mode==="swap"){ const ex=d.exercises.find(x=>x.id===exPicker.exId); if(ex) ex.name=name; } else { d.exercises.push(mkEx(name,2)); } exPicker=null; save(); renderApp(); return; }
  if (a === "ex-custom") { const nm=prompt(exPicker&&exPicker.mode==="swap"?"Nuevo nombre del ejercicio:":"Nombre del ejercicio:",""); if(nm && nm.trim()){ const d=day(); if(exPicker&&exPicker.mode==="swap"){ const ex=d.exercises.find(x=>x.id===exPicker.exId); if(ex) ex.name=nm.trim(); } else d.exercises.push(mkEx(nm.trim(),2)); exPicker=null; save(); renderApp(); } return; }

  // Peso corporal
  if (a === "weight-save") { const dEl=document.getElementById("wDate"), kEl=document.getElementById("wKg"); const date=dEl?dEl.value:""; const kg=parseFloat((kEl?kEl.value:"").replace(",",".")); if(!date){ alert("Elegí una fecha."); return; } if(!(kg>0)){ alert("Poné un peso válido."); return; } const exw=state.weights.find(w=>w.date===date); if(exw) exw.kg=kg; else state.weights.push({id:uid(),date,kg}); weightForm={date:today(),kg:""}; save(); renderApp(); return; }
  if (a === "weight-edit") { const w=state.weights.find(x=>x.id===el.dataset.id); if(w){ weightForm={date:w.date,kg:String(w.kg)}; } renderApp(); return; }
  if (a === "weight-remove") { state.weights=state.weights.filter(x=>x.id!==el.dataset.id); save(); renderApp(); return; }

  // Agua
  if (a === "water-add") { const n=parseInt(el.dataset.n)||0; state.water=Math.max(0,(state.water||0)+n); save(); renderApp(); return; }
  if (a === "water-goal") { const v=prompt("Meta de agua en ml (ej: 3000):", String(Math.round(state.waterGoal||3000))); if(v!==null){ const n=parseInt(v); if(n>0){ state.waterGoal=n; save(); renderApp(); } } return; }

  // Días
  if (a === "addday") { const nd={id:uid(),name:"Nuevo",subtitle:"",exercises:[]}; state.days.push(nd); activeId=nd.id; pendingFocusDay=true; save(); renderApp(); return; }
  if (a === "delday") { if(state.days.length<=1){ alert("Tiene que quedar al menos un día."); return; } if(confirm("¿Eliminar este día?")){ state.days=state.days.filter(x=>x.id!==activeId); activeId=state.days[0].id; save(); renderApp(); } return; }

  // Entreno
  if (a === "tab") { activeId = el.dataset.day; renderApp(); return; }
  const d = day();
  const ex = el.dataset.ex && d.exercises.find(x=>x.id===el.dataset.ex);
  if (a === "toggle") { const s=ex.sets.find(x=>x.id===el.dataset.set); s.done=!s.done; }
  else if (a === "addset") { ex.sets.push(mkSet()); }
  else if (a === "removeset") { ex.sets = ex.sets.filter(x=>x.id!==el.dataset.set); }
  else if (a === "removeex") { d.exercises = d.exercises.filter(x=>x.id!==el.dataset.ex); }
  else if (a === "clear") { d.exercises.forEach(x=>x.sets.forEach(s=>s.done=false)); }
  else return;
  save(); renderApp();
});

renderApp();
</script>
</body>
</html>
